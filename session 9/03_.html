<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create array ---- Convert to JSON string</title>
</head>

<body>
    <h1>Create array ---- Convert to JSON string</h1>

    <script>
        let foodApps = [
            "Zomato",
            "Swiggy",
            "Domino's"
        ];

        let jsonstring = JSON.stringify(foodApps);

        console.log(jsonstring);

    </script>
</body>

</html>
