<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wishlist App</title>

    <style>
        body {
            font-family: Arial;
            background: #f1f3f6;
            text-align: center;
        }

        input {
            padding: 10px;
            margin: 5px;
        }

        button {
            padding: 10px;
            background: #2874f0;
            color: white;
            border: none;
            cursor: pointer;
        }

        .item {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <h1>Wishlist App</h1>

    <input type="text" id="itemName" placeholder="Item Name">
    <input type="number" id="itemPrice" placeholder="Price">

    <button id="addBtn">Add to Wishlist</button>

    <div id="wishlist"></div>

    <script type="module" src="012_wishlist.js"></script>

</body>
</html>
