<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Order ID</title>
</head>
<body>

    <h1>Order ID Generator</h1>

    <p id="orderid"></p>

    <script type="module">
        import { generateid } from "./01_utils.js";

        let orderid = generateid();

        console.log("New order ID:", orderid);

        document.getElementById("orderid").textContent =
            "Generated Order ID: " + orderid;
    </script>

</body>
</html>
