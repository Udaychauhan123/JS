<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Payment Amount</title>
</head>
<body>

    <script>
        function checkPaymentAmount(amount) {
            if (amount <= 0) {
                throw new Error('Amount must be positive');
            }

            return 'Payment accepted';
        }

        try {
            console.log(checkPaymentAmount(500));
        } catch (error) {
            console.error(error.message);
        }

        try {
            console.log(checkPaymentAmount(0));
        } catch (error) {
            console.error(error.message);
        }

        try {
            console.log(checkPaymentAmount(-100));
        } catch (error) {
            console.error(error.message);
        }
    </script>

</body>
</html>
