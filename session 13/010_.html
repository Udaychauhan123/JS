<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Handling Example</title>
</head>
<body>

    <script>
        let user;

        try {
            console.log(user.name);
        } catch (e) {
            console.error('User data not found');
        }
    </script>

</body>
</html>
