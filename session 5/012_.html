<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow Function</title>
</head>

<body>
    <h1>Arrow Function</h1>

    <script>

        const double = (x) => {
            return x * 2;
        };

        console.log(double(5));
        console.log(double(10));

        document.write("<h3>Double of 5 = " + double(5) + "</h3>");
        document.write("<h3>Double of 10 = " + double(10) + "</h3>");
    </script>
</body>

</html>
