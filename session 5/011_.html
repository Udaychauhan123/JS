<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Menu</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #e23744;
        }

        .menu-item {
            background: white;
            width: 300px;
            margin: 15px auto;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .menu-item h3 {
            margin: 0;
            color: #333;
        }

        .menu-item p {
            margin-top: 8px;
            color: #e23744;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Zomato Menu --- using with appendChild</h1>

    <script>

        function showMenuItem(name, price) {

            const div = document.createElement("div");

            div.className = "menu-item";

            div.innerHTML = `
                <h3>${name}</h3>
                <p>₹${price}</p>
            `;

            return div;
        }

        document.body.appendChild(
            showMenuItem("Paneer Butter Masala", 250)
        );

        document.body.appendChild(
            showMenuItem("Veg Biryani", 180)
        );

        document.body.appendChild(
            showMenuItem("Masala Dosa", 120)
        );

    </script>

</body>

</html>
