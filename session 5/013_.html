<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Playlist Buttons</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }

        button {
            margin: 10px;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>My Favorite Spotify Tracks</h1>

    <script>

        function createPlaylistButton(songName, themeColor) {

            const button = document.createElement("button");

            button.textContent = songName;
            button.style.backgroundColor = themeColor;

            return button;
        }

        const song1 = createPlaylistButton("Believer", "#1DB954");
        const song2 = createPlaylistButton("Shape of You", "#FF5733");
        const song3 = createPlaylistButton("Blinding Lights", "#6A5ACD");

        document.body.appendChild(song1);
        document.body.appendChild(song2);
        document.body.appendChild(song3);

    </script>

</body>

</html>
