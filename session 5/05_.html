<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const getDiscountedPrice = function(price,discountPercent){
            return price - (price * discountPercent /100);
        };

        console.log(getDiscountedPrice(5000,20));
        console.log(getDiscountedPrice(1000,10));
        console.log(getDiscountedPrice(500,5));
        console.log(getDiscountedPrice(10000,50));
        
    </script>
</body>
</html>
