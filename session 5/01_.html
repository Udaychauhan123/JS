<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Button</title>
</head>

<body>
    <h1>Spotify Button</h1>

    <div id="buttoncontainer"></div>

    <script>
        function spotifybutton(label, color) {
            return `<button style="
                background-color: ${color};
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 20px;
                cursor: pointer;
                font-size: 16px;
            ">${label}</button>`
        }

        document.getElementById("buttoncontainer").innerHTML = spotifybutton("play music", "green");
        // document.getElementById("buttoncontainer").innerHTML = spotifybutton("Pause", "orange");
        // document.getElementById("buttoncontainer").innerHTML = spotifybutton("Stop", "red");
    </script>
</body>

</html>
