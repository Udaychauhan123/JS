<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Order Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff4e50, #f9d423);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 300px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            color: #ff4e50;
            margin-bottom: 20px;
        }

        select, input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        p {
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Zomato Food Order 🍽️</h2>

    <label>Select Cuisine:</label>
    <select id="cuisine" onchange="showCuisine(this.value)">
        <option value="">-- Select --</option>
        <option value="Indian">Indian</option>
        <option value="Chinese">Chinese</option>
        <option value="Italian">Italian</option>
        <option value="Mexican">Mexican</option>
        <option value="Fast Food">Fast Food</option>
    </select>

    <label>Quantity:</label>
    <input type="number" id="qty" placeholder="Enter quantity" min="1">

    <p id="output"></p>
</div>

<script>
    function showCuisine(value) {
        document.getElementById("output").innerText =
            "You selected: " + value + " cuisine 🍛";
    }
</script>

</body>
</html>
