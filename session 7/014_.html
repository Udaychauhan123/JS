<!DOCTYPE html>
<html>
<head>
  <title>Add to Cart Event Logger</title>
  <style>
    .product-card {
      width: 250px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-family: Arial;
    }

    .btn {
      background-color: #ff9f00;
      color: white;
      padding: 10px;
      border: none;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      border-radius: 5px;
    }

    .btn:hover {
      background-color: #fb641b;
    }
  </style>
</head>
<body>

<div class="product-card">
  <h3>Mobile Phone</h3>
  <p>₹15,999</p>

  <button class="btn" id="addToCartBtn">Add to Cart</button>
</div>

<p id="log"></p>

<script>
  const btn = document.getElementById("addToCartBtn");
  const log = document.getElementById("log");

  ["click", "mouseover", "mouseout"].forEach(eventType => {
    btn.addEventListener(eventType, function(event) {
      console.log("Event Type:", event.type);
      console.log("X:", event.clientX, "Y:", event.clientY);

      log.textContent =
        "Event: " + event.type +
        " | X: " + event.clientX +
        " | Y: " + event.clientY;
    });
  });
</script>

</body>
</html>
