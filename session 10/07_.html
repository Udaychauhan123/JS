<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>destructuring</title>
</head>
<body>
    <h1>destructuring</h1>
    <script>
        const order = { item: 'Pizza', price: 350, user: 'Amit' };

        const { item, price, user } = order;

        console.log(`${user} ordered ${item} for ₹${price}`);
    </script>
</body>
</html>
