<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Food</title>
</head>
<body>

<h1>Food Order System</h1>

<script>
    function orderFood(item, quantity = 1) {
        return `You ordered ${quantity} ${item}.`;
    }

    console.log(orderFood("Pizza"));

    console.log(orderFood("Burger", 2));
</script>

</body>
</html>
