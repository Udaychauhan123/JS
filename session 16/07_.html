<body>
    <script>
        const orders = [
            { id: 1, clicks: 120 },
            { id: 2, clicks: 250 },
            { id: 3, clicks: 90 },
            { id: 4, clicks: 340 }
        ];

        const totalClicks = orders.reduce((acc, order) => acc + order.clicks, 0);

        console.log(totalClicks);
    </script>
