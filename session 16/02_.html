<body>
    <script>
        let products = [
            { name: "Redmi Note 12", price: 15000, isInStock: true },
            { name: "iPhone 14", price: 70000, isInStock: false },
            { name: "Samsung Galaxy S23", price: 65000, isInStock: true },
            { name: "Realme Narzo", price: 12000, isInStock: false }
        ];

        const inStockProducts = products.filter(product => product.isInStock);

        console.log(inStockProducts);
    </script>
