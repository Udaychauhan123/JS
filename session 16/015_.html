<!DOCTYPE html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        const transactions = [
            { id: 1, amount: 500 },
            { id: 2, amount: 1200 },
            { id: 3, amount: 750 },
            { id: 4, amount: 300 }
        ];

        const totalSpent = transactions.map(t => t.amount).reduce((a, b) => a + b, 0);

        console.log(totalSpent);
    </script>
</body>
