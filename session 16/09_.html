<body>
    <script>
        const posts = [
            { id: 1, likes: 120 },
            { id: 2, likes: 450 },
            { id: 3, likes: 89 },
            { id: 4, likes: 300 }
        ];

        const totalLikes = posts.reduce((acc, post) => acc + post.likes, 0);

        console.log(totalLikes);
    </script>
