<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        const movies = [
            {
                title: "Inception",
                year: 2010,
                rating: {
                    imdb: 8.8,
                    rottenTomatoes: 87
                }
            },
            {
                title: "Interstellar",
                year: 2014,
                rating: {
                    imdb: 8.6,
                    rottenTomatoes: 73
                }
            },
            {
                title: "The Dark Knight",
                year: 2008,
                rating: {
                    imdb: 9.0,
                    rottenTomatoes: 94
                }
            }
        ];

        for (let i = 0; i < movies.length; i++) {
            const movie = movies[i];

            console.log(
                movie.title + " - IMDb Rating: " + movie.rating.imdb
            );
        }
    </script>
</body>
