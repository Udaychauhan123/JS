<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        const orders = [
            {
                orderId: "OD101",
                items: [
                    { itemName: "Smartphone", price: 15000 },
                    { itemName: "Cover", price: 500 }
                ],
                delivery: {
                    address: "Surat",
                    status: "Delivered"
                }
            },
            {
                orderId: "OD102",
                items: [
                    { itemName: "Laptop", price: 55000 },
                    { itemName: "Mouse", price: 800 },
                    { itemName: "Keyboard", price: 1200 }
                ],
                delivery: {
                    address: "Ahmedabad",
                    status: "Shipped"
                }
            },
            {
                orderId: "OD103",
                items: [
                    { itemName: "Shoes", price: 2000 },
                    { itemName: "Socks", price: 300 }
                ],
                delivery: {
                    address: "Rajkot",
                    status: "Processing"
                }
            }
        ];


        for (let i = 0; i < orders.length; i++) {
            const order = orders[i];

            let totalPrice = 0;

            for (let j = 0; j < order.items.length; j++) {
                totalPrice += order.items[j].price;
            }

            console.log(
                "Order ID: " + order.orderId + " | Total Price: ₹" + totalPrice
            );
        }
    </script>
</body>

</html>
