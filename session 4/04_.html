<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>While loop</title>
</head>

<body>
    <h1>while loop</h1>
    <script>
        const iplTeams = [
            "Mumbai Indians",
            "Chennai Super Kings",
            "Royal Challengers Bengaluru",
            "Kolkata Knight Riders",
            "Rajasthan Royals",
            "Gujrat Titans"
        ];

        let i = 0;

        while (i < iplTeams.length) {
            console.log(iplTeams[i].toUpperCase());
            i++;

        }
    </script>
</body>

</html>
