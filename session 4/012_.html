<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Total price of product</title>
</head>

<body>
    <h1>Total price of product</h1>

    <script>
        const price = [79999, 2999, 1499, 54999];

        let totalprice = 0;

        for (const prices of price) {
            totalprice += prices;
        }

        console.log("Total price of product is:", totalprice);

    </script>
</body>

</html>
