<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>While loop</title>
</head>

<body>
    <h1>while loop</h1>
    <script>
        const usernames = [
            "virat.kohli",
            "cristiano",
            "leomessi",
            "natgeo",
            "instagram",
            "selenagomez",
            "therock",
            "nasa"
        ];

        let i = 0;

        while (i < usernames.length) {
            console.log(usernames[i].toUpperCase());
            i++;

        }
    </script>
</body>

</html>
