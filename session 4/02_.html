<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for loops</title>
</head>

<body>
    <h1>For loop</h1>

    <script>
        let favapp = [
            "Instagram",
            "Zomato",
            "Paytm",
            "WhatsApp",
            "Spotify"
        ];

        for(let i=0;i<favapp.length;i++){
            console.log(favapp[i]);
            
        }
    </script>
</body>

</html>
