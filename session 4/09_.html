<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order status</title>
</head>

<body>
    <h1>Order status</h1>

    <script>
        const orderStatus = [
            "Preparing",
            "Out for delivery",
            "Delivered"
        ];

        let i = 0;

        do {
            console.log("order status:" + orderStatus[i]);
            i++;
        } while (i < orderStatus.length);
    </script>
</body>

</html>
