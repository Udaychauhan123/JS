<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do...While loop</title>
</head>

<body>
    <h1>Do...While loop</h1>
    <script>
        const playlist = [
            "Shri Ram Janki Baithe Hain Mere Seene Mein",
            "Ram Siya Ram",
            "Hanuman Chalisa",
            "Bajrang Baan"
        ];

        let i = 0;

        do {
            console.log(i + ": " + playlist[i]);
            i++;
        } while (i < playlist.length);
    </script>
</body>

</html>
