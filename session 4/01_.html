<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For loop</title>
</head>

<body>
    <h1>For loop</h1>

    <script>
        const favapps = [
            "Instagram",
            "Zomato",
            "Paytm",
            "Spotify",
            "WhatsApp"

        ];

        for(let i=0; i<favapps.length; i++){
            console.log(favapps[i]);
            
        }
    </script>
</body>

</html>
