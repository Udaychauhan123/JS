<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forEach</title>
</head>

<body>
    <h1>forEach</h1>

    <script>
        const teams = ["MI", "CSK", "RCB", "GT"];

        teams.forEach(team => {
            console.log(`Go ${team}!`);
        });
    </script>
</body>

</html>
