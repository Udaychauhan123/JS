<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for Each</title>
</head>

<body>
    <h1>For Each</h1>

    <script>
        const contacts = [
            "Jaydeep",
            "Rohan",
            "Karan",
            "Pooja",
            "Sneha"
        ];

        contacts.forEach(contact => {
            console.log(`Sending hi to ${contact} on WhatsApp!`);
        });
    </script>
</body>

</html>
