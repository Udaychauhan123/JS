<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1DB954, #191414);
            min-height: 100vh;
            margin: 0;
            padding: 30px;
            text-align: center;
        }

        h2 {
            color: white;
            font-size: 35px;
            margin-bottom: 20px;
        }

        input {
            width: 300px;
            padding: 12px;
            border: none;
            border-radius: 25px;
            outline: none;
            font-size: 16px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: #ff4757;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #e84118;
            transform: scale(1.05);
        }

        #playlist {
            width: 400px;
            margin: 30px auto;
            padding: 0;
        }

        #playlist li {
            list-style: none;
            background: white;
            margin: 10px 0;
            padding: 15px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            transition: 0.3s;
        }

        #playlist li:hover {
            transform: translateX(10px);
        }
    </style>
</head>

<body>
    <h2>My Playlist</h2>

    <input type="text" id="songinput" placeholder="Enter the song name">
    <button onclick="addsong()">Add Song</button>

    <ul id="playlist"></ul>

    <script>
        function addsong() {
            let songname = document.querySelector("#songinput").value;

            if (songname === "") {
                alert("Please enter a song name");
                return;
            }

            let li = document.createElement("li");

            li.textContent = songname;

            document.querySelector("#playlist").appendChild(li);

            document.querySelector("#songinput").value = "";
        }
    </script>
</body>

</html>
