<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Box</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #f4f4f4;
    padding-top: 50px;
}

h2 {
    color: #333;
}

input {
    width: 250px;
    padding: 10px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

#moodbox {
    width: 250px;
    height: 150px;
    margin: 20px auto;
    border: 2px solid #333;
    border-radius: 10px;
    background-color: white;
    transition: 0.3s;
}
    </style>
</head>

<body>
    <h2>Color Mood Box</h2>

    <input type="text" id="colorinput" placeholder="enter the color" oninput="changecolor()">

    <div id="moodbox"></div>

    <script>
        function changecolor() {
            let color = document.getElementById("colorinput").value;

            document.getElementById("moodbox").style.backgroundColor = color;
        }
    </script>
</body>

</html>
