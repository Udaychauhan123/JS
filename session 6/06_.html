<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friend List</title>
    <style>
        body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #312e81
    );
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 50px;
}

h2 {
    color: #00f7ff;
    font-size: 40px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow:
        0 0 10px #00f7ff,
        0 0 20px #00f7ff;
}

input {
    width: 320px;
    padding: 15px;
    border: 2px solid #00f7ff;
    border-radius: 50px;
    background: rgba(255,255,255,0.08);
    color: white;
    font-size: 16px;
    outline: none;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0,247,255,0.3);
}

input::placeholder {
    color: #d1d5db;
}

button {
    margin-left: 10px;
    padding: 15px 25px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(
        45deg,
        #00f7ff,
        #7c3aed
    );
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.4s;
    box-shadow: 0 0 20px rgba(124,58,237,0.5);
}

button:hover {
    transform: translateY(-4px) scale(1.05);
    box-shadow:
        0 0 20px #00f7ff,
        0 0 40px #7c3aed;
}

#friendlist {
    width: 450px;
    margin-top: 40px;
    padding: 0;
}

#friendlist li {
    list-style: none;
    margin: 15px 0;
    padding: 18px;
    color: white;
    font-size: 18px;
    border-radius: 15px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-left: 5px solid #00f7ff;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    transition: 0.4s;
}

#friendlist li:hover {
    transform: translateX(15px);
    border-left-color: #7c3aed;
    box-shadow:
        0 0 20px rgba(0,247,255,0.5);
}
    </style>
</head>
<body>
    <h2>Friend List</h2>

    <input type="text" id="friendinput" placeholder="Enter the friend's name">
    <button onclick="addfriend()">AddFriend</button>

    <ul id="friendlist"></ul>

    <script>
        function addfriend() {

            const friendName =
                document.querySelector("#friendinput").value;

            if (friendName === "") {
                alert("Please enter a friend's name!");
                return;
            }

            const li = document.createElement("li");

            li.textContent = friendName;

            document
                .querySelector("#friendlist")
                .appendChild(li);

            document.querySelector("#friendinput").value = "";
        }
    </script>
</body>
</html>
