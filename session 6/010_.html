<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Box</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        h2 {
            color: #00e5ff;
            font-size: 40px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #00e5ff;
        }

        input {
            width: 320px;
            padding: 15px;
            border: none;
            border-radius: 50px;
            outline: none;
            font-size: 16px;
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        input::placeholder {
            color: #d1d5db;
        }

        #moodbox {
            width: 300px;
            height: 200px;
            margin-top: 30px;
            border-radius: 25px;
            border: 3px solid white;
            box-shadow:
                0 0 20px rgba(255, 255, 255, 0.3),
                0 0 40px rgba(0, 229, 255, 0.3);
            transition: all 0.4s ease;
        }

        #moodbox:hover {
            transform: scale(1.05);
            box-shadow:
                0 0 30px rgba(255, 255, 255, 0.5),
                0 0 60px rgba(0, 229, 255, 0.5);
        }
    </style>
</head>

<body>
    <h2>Color Mood Box</h2>

    <input type="text" id="colorinput" placeholder="enter the color" oninput="changecolor()">

    <div id="moodbox"></div>

    <script>
        function changecolor() {
            let color = document.getElementById("colorinput").value;

            document.getElementById("moodbox").style.backgroundColor = color;
        }
    </script>
</body>

</html>
