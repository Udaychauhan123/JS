<!DOCTYPE html>
<html>

<head>
    <title>Flipkart Wishlist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
        }

        .container-box {
            max-width: 700px;
            margin: 40px auto;
        }

        .product-card {
            background: white;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .btn-remove {
            background: #ff3f6c;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
        }

        .btn-remove:hover {
            background: #e6365f;
        }
    </style>
</head>

<body>

    <div class="container container-box">

        <h3 class="mb-3">🛒 Flipkart Wishlist</h3>

        <div class="input-group mb-3">
            <input type="text" id="productInput" class="form-control" placeholder="Enter product name">
            <button class="btn btn-primary" id="addBtn">Add Product</button>
        </div>

        <div id="wishlist"></div>

    </div>

    <script>
        const wishlist = document.getElementById("wishlist");
        const addBtn = document.getElementById("addBtn");
        const productInput = document.getElementById("productInput");

        function createProduct(name) {
            const div = document.createElement("div");
            div.classList.add("product-card");
            div.innerHTML = `
        <span>${name}</span>
        <button class="btn-remove">Remove</button>
    `;
            return div;
        }

        wishlist.appendChild(createProduct("Redmi Note 12"));
        wishlist.appendChild(createProduct("iPhone 14"));
        wishlist.appendChild(createProduct("Samsung Galaxy S23"));

        addBtn.addEventListener("click", function () {
            const value = productInput.value.trim();

            if (value !== "") {
                wishlist.appendChild(createProduct(value));
                productInput.value = "";
            }
        });

        wishlist.addEventListener("click", function (e) {
            if (e.target.classList.contains("btn-remove")) {
                e.target.parentElement.remove();
            }
        });
    </script>

</body>

</html>
