<!DOCTYPE html>
<html>

<head>
    <title>Remove Card (Event Delegation)</title>

    <style>
        body {
            font-family: Arial;
            background: #f1f1f1;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
        }

        .card {
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .remove-btn {
            background: red;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        .add-btn {
            margin-bottom: 15px;
            padding: 8px 12px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container">

        <button class="add-btn" id="addBtn">Add Card</button>

        <div id="container">

            <div class="card">
                <span>Product 1</span>
                <button class="remove-btn">X</button>
            </div>

            <div class="card">
                <span>Product 2</span>
                <button class="remove-btn">X</button>
            </div>

        </div>

    </div>

    <script>
        const container = document.getElementById("container");
        const addBtn = document.getElementById("addBtn");

        let count = 3;

        addBtn.addEventListener("click", function () {
            const div = document.createElement("div");
            div.classList.add("card");
            div.innerHTML = `
        <span>Product ${count}</span>
        <button class="remove-btn">X</button>
    `;
            container.appendChild(div);
            count++;
        });

        container.addEventListener("click", function (e) {
            if (e.target.classList.contains("remove-btn")) {
                e.target.parentElement.remove();
            }
        });
    </script>

</body>

</html>
