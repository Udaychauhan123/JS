<!DOCTYPE html>
<html>

<head>
    <title>Instagram Stories</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
            color: white;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 18px;
            padding: 40px;
            flex-wrap: wrap;
        }

        .story {
            width: 90px;
            height: 90px;
            background: linear-gradient(45deg, #feda75, #d62976, #962fbf);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .story:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
        }

        .remove {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ff3b30;
            color: white;
            border: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            transition: 0.2s;
        }

        .remove:hover {
            background: darkred;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <h2>📸 Instagram Stories</h2>

    <div class="container" id="storyContainer">
        <div class="story">A<button class="remove">×</button></div>
        <div class="story">B<button class="remove">×</button></div>
        <div class="story">C<button class="remove">×</button></div>
        <div class="story">D<button class="remove">×</button></div>
    </div>

    <script>
        const storyContainer = document.getElementById("storyContainer");

        storyContainer.addEventListener("click", function (e) {
            if (e.target.classList.contains("remove")) {
                e.target.parentElement.remove();
            }
        });
    </script>

</body>

</html>
