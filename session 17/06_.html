<!DOCTYPE html>
<html>

<head>
    <title>Flipkart Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f1f3f6;
        }

        .cart-container {
            max-width: 700px;
            margin: 40px auto;
        }

        .cart-card {
            background: white;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .remove-icon {
            background: red;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
        }

        .remove-icon:hover {
            background: darkred;
        }

        h3 {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="container cart-container">
        <h3>🛒 Flipkart Shopping Cart</h3>

        <div id="cartList"></div>
    </div>

    <script>
        const cartList = document.getElementById("cartList");

        const products = [
            "Redmi Note 12",
            "iPhone 14",
            "Samsung Galaxy S23",
            "Realme Narzo"
        ];

        function createCard(product) {
            const div = document.createElement("div");
            div.classList.add("cart-card");
            div.innerHTML = `
        <span>${product}</span>
        <button class="remove-icon">X</button>
    `;
            return div;
        }

        products.forEach(product => {
            cartList.appendChild(createCard(product));
        });

        cartList.addEventListener("click", function (e) {
            if (e.target.classList.contains("remove-icon")) {
                e.target.parentElement.remove();
            }
        });
    </script>

</body>

</html>
