<!DOCTYPE html>
<html>

<head>
    <title>Song List</title>
    <style>
        .container {
            width: 300px;
            margin: 20px auto;
        }

        .card {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            margin: 8px 0;
            background: #f2f2f2;
            border-radius: 6px;
            font-family: Arial;
        }

        .remove {
            cursor: pointer;
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container" id="songContainer"></div>

    <script>
        let songs = [
            "Ram Siya Ram",
            "Shri Ram Chandra Kripalu",
            "Mangal Bhavan Amangal Hari",
            "Jai Shri Ram"
        ];

        let container = document.getElementById("songContainer");

        songs.forEach(song => {
            const div = document.createElement("div");
            div.classList.add("card");
            div.innerHTML = `
        <span>${song}</span>
        <span class="remove">X</span>
    `;
            container.appendChild(div);
        });

        container.addEventListener("click", function (e) {
            if (e.target.classList.contains("remove")) {
                e.target.parentElement.remove();
            }
        });
    </script>

</body>

</html>
