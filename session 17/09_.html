<!DOCTYPE html>
<html>

<head>
    <title>Dynamic Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f1f3f6;
            font-family: Arial;
        }

        .container-box {
            max-width: 700px;
            margin: 40px auto;
        }

        .cart-card {
            background: white;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .remove-btn {
            background: #ff3f6c;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .remove-btn:hover {
            background: #e6365f;
        }
    </style>
</head>

<body>

    <div class="container container-box">

        <h3>🛒 Dynamic Cart</h3>

        <button class="btn btn-primary mb-3" id="addBtn">Add Random Product</button>

        <div id="cartList"></div>

    </div>

    <script>
        const cartList = document.getElementById("cartList");
        const addBtn = document.getElementById("addBtn");

        const products = [
            "Redmi Note 12",
            "iPhone 14",
            "Samsung Galaxy S23",
            "Realme Narzo",
            "OnePlus Nord",
            "Vivo T2",
            "Oppo Reno 10",
            "Motorola Edge 40"
        ];

        function createCard(name) {
            const div = document.createElement("div");
            div.classList.add("cart-card");
            div.innerHTML = `
        <span>${name}</span>
        <button class="remove-btn">X</button>
    `;
            return div;
        }

        cartList.appendChild(createCard("Redmi Note 12"));
        cartList.appendChild(createCard("iPhone 14"));

        addBtn.addEventListener("click", function () {
            const randomProduct = products[Math.floor(Math.random() * products.length)];
            cartList.appendChild(createCard(randomProduct));
        });

        cartList.addEventListener("click", function (e) {
            if (e.target.classList.contains("remove-btn")) {
                e.target.parentElement.remove();
            }
        });
    </script>

</body>

</html>
