<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable</title>
</head>
<body>
    <h1>Declare     -   Reassign    -   Redeclare  </h1>


    <script>
        var foodApp = "Zomato";
        console.log("First Value:",foodApp);

        foodApp = "Swiggy";
        console.log("Reassignment:",foodApp);

        var foodApp = "Uber Eats";
        console.log("After Redeclaration:", foodApp);
        
        
    </script>
</body>
</html>
