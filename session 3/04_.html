<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>discount</title>
</head>

<body>
    <h1>Discount</h1>

    <script>
        function discount(price) {
            if (price < 500) {
                console.log("special Discount");

            } else {
                console.log("Regular Price");

            }
        }

        discount(450);
        discount(750);
    </script>
</body>

</html>
