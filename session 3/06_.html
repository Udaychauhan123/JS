<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eligiable discount</title>
</head>
<body>
    <h1>Eligiable discount</h1>

    <script>
        function eligiablediscount(totalamount){
            return totalamount >= 500;
        }

        console.log(eligiablediscount(300));
        console.log(eligiablediscount(700));
        
    </script>
</body>
</html>
