<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zomato Order Status</title>
</head>
<body>

<h1>Check Console for Order Status</h1>

<script>
    function placeOrder(item, callback) {
        setTimeout(() => {
            callback(`Your ${item} is being prepared`);
        }, 1000);
    }

    placeOrder("Pizza", function(message) {
        console.log(message);
    });
</script>

</body>
</html>
