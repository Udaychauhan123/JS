<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        function getOrderStatus(orderId) {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    if (orderId % 2 === 0) {
                        resolve("Order delivered");
                    } else {
                        reject("Order not found");
                    }
                }, 1500);
            });
        }

        getOrderStatus(102)
            .then((message) => {
                console.log(message);
            })
            .catch((error) => {
                console.log(error);
            });

        getOrderStatus(103)
            .then((message) => {
                console.log(message);
            })
            .catch((error) => {
                console.log(error);
            });
    </script>
</body>

</html>
