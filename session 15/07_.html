<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        class flipkartproduct{
            constructor(title,price,rating){
                this.title = title;
                this.price = price;
                this.rating = rating;
            }

            getdiscountprice(discountpercent){
                return this.price - (this.price * discountpercent /100);
            }
        }

        let product1 = new flipkartproduct("Smartphone",2000,4.5);

        console.log("original price",product1.price);
        console.log("Discounted price:",product1.getdiscountprice(10));
        
        
    </script>
</body>
</html>
